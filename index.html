<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- Proper mobile rendering -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Wedding Invitation</title>

<!-- Fonts (optimized) -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* FIX: mobile browser height issue */
body {
    font-family: 'Playfair Display', serif;
    background: #e4e4db;
    height: 100dvh;
    overflow: hidden;
    position: relative;
}

/* Background */
.bg {
    position: absolute;
    inset: 0;
    z-index: -2;
}

.bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;

    /* optimized blur */
    filter: blur(4px) brightness(0.75);
    transform: scale(1.05);
}

/* Overlay */
.overlay {
    position: absolute;
    inset: 0;
    background: rgba(228,228,219,0.3);
    z-index: -1;
}

/* Layout */
.wrapper {
    height: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 16px;
}

/* Card */
.card {
    width: 100%;
    max-width: 420px;
    background: rgba(228,228,219,0.96);

    /* fallback if backdrop not supported */
    backdrop-filter: blur(8px);

    border-radius: 18px;
    padding: 32px 20px;
    text-align: center;

    box-shadow: 0 15px 40px rgba(0,0,0,0.25);

    /* fast animation */
    transform: translateY(30px);
    opacity: 0;
    animation: enter 0.6s ease forwards;

    cursor: pointer;
}

/* Smooth entrance */
@keyframes enter {
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

/* Names */
.card h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 40px;
    color: #6e6a5e;
    margin-bottom: 8px;
}

/* Text */
.card p {
    font-size: 14px;
    color: #5f5b50;
    margin-bottom: 20px;
}

/* Button */
.btn {
    width: 100%;
    padding: 12px;
    border: none;
    background: #6e6a5e;
    color: #e4e4db;
    border-radius: 25px;
    font-size: 13px;
    letter-spacing: 2px;
}

/* Tap feedback */
.card:active {
    transform: scale(0.98);
}

/* Exit */
.fade-out {
    animation: exit 0.5s forwards;
}

@keyframes exit {
    to {
        opacity: 0;
        transform: translateY(20px);
    }
}

/* Desktop adjustment */
@media (min-width: 768px) {
    .wrapper {
        align-items: center;
    }

    .card {
        padding: 50px 40px;
    }

    .card h1 {
        font-size: 52px;
    }
}
</style>
</head>

<body>

<div class="bg">
    <img src="image/6.jpg" alt="background" loading="eager" decoding="async">
</div>

<div class="overlay"></div>

<div class="wrapper">
    <div class="card" id="card">
        <h1>Elpi & Bea</h1>
        <p>We request the honor of your presence</p>
        <button class="btn">OPEN INVITATION</button>
    </div>
</div>

<script>
const card = document.getElementById("card");

/* instant response (no delay feeling) */
card.addEventListener("click", () => {
    card.classList.add("fade-out");

    setTimeout(() => {
        window.location.href = "home.html";
    }, 400);
}, { passive: true });

/* keyboard support */
card.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        card.click();
    }
});
</script>

</body>
</html>
